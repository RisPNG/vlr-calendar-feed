name: Build and deploy calendar feeds

on:
  schedule:
    # GitHub cron is UTC. Minute 17 avoids the top-of-hour load spike.
    - cron: "17 */2 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "config/**"
      - "scripts/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/build-calendar.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Build calendars
        run: python scripts/build_calendar.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
